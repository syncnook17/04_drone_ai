<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control - DJI M4E Cockpit</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #121212;
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #map {
            width: 50%;
            height: 100%;
            border-right: 2px solid #222;
        }
        #video-panel {
            width: 50%;
            height: 100%;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .nav-links {
            display: flex;
            gap: 15px;
            margin-bottom: 5px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .nav-links a {
            color: #deff9a;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
        h2 {
            margin: 0;
            color: #f5f5f5;
            font-size: 22px;
        }
        .backend-box {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .backend-box h4 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #aaaaaa;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn-backend {
            background: #deff9a;
            color: #121212;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            flex: 1;
            transition: opacity 0.2s;
        }
        .btn-backend.ai {
            background: #38bdf8;
        }
        .btn-backend:hover, .btn-track:hover {
            opacity: 0.9;
        }
        video {
            width: 100%;
            aspect-ratio: 16/9;
            background: black;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .btn-track {
            background: #ff4a4a;
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(255,74,74,0.2);
        }
        .hint {
            color: #666;
            font-size: 12px;
            margin: 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="video-panel">
        <div class="nav-links">
            <a href="/dashboard/mission/">🗺️ สั่งการบิน</a> | 
            <a href="/dashboard/heatmap/">🔥 แผนที่ความร้อน</a> | 
            <a href="/dashboard/logs/">📋 ประวัติจัดเก็บ</a>
        </div>
        
        <h2>🛸 ระบบควบคุมการบิน & ตรวจจับวัตถุ Real-time</h2>

        <div class="backend-box">
            <h4>⚙️ ระบบจัดการเซิร์ฟเวอร์หลังบ้าน (Background Tasks)</h4>
            <div class="btn-group">
                <button class="btn-backend" onclick="launchService('telemetry')">📡 เปิดระบบรับพิกัด (Telemetry)</button>
                <button class="btn-backend ai" onclick="launchService('ai')">🧠 เปิดระบบ AI (YOLOv8)</button>
            </div>
        </div>
        
        <video id="videoElement" controls autoplay muted></video>
        
        <button class="btn-track" onclick="triggerSmartTrack()">🎯 สั่งล็อกและบินติดตามเป้าหมาย (Smart Track)</button>
        <p class="hint">*เมื่อคลิกปุ่ม ระบบจะส่งพิกัดกล่องเป้าหมายไปยังตัวโดรน Matrice 4E ผ่าน DJI Cloud API เพื่อล็อกกิมบอลและบินตามโดยอัตโนมัติ</p>
    </div>

    <script>
        // ==========================================
        // 1. ตั้งค่าและเริ่มต้นระบบแผนที่ (Leaflet Map)
        // ==========================================
        // ตั้งพิกัดเริ่มต้นเป็นกรุงเทพฯ (Lat, Lng) ซูมระดับ 15
        var map = L.map('map').setView([13.7563, 100.5018], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        
        // สร้างหมุดสัญลักษณ์ตัวโดรน
        var droneMarker = L.marker([13.7563, 100.5018]).addTo(map).bindPopup("ตำแหน่งโดรน Matrice 4E");

        // ฟังก์ชันดักดึงพิกัดล่าสุดของโดรนจาก Django API ทุกๆ 1 วินาที (Polling)
        setInterval(function() {
            fetch('/api/drone-location/')
                .then(response => response.json())
                .then(data => {
                    var newPos = [data.lat, data.lng];
                    droneMarker.setLatLng(newPos);
                    map.panTo(newPos); // เลื่อนแผนที่ตามตำแหน่งโดรน
                    droneMarker.getPopup().setContent(`<b>โดรน Matrice 4E</b><br>ความสูง: ${data.alt.toFixed(1)} เมตร`);
                })
                .catch(err => console.log("ยังไม่มีข้อมูลพิกัดส่งเข้ามา..."));
        }, 1000);

        // ==========================================
        // 2. ระบบเชื่อมต่อวิดีโอสด (SRS Media Server)
        // ==========================================
        if (flvjs.isSupported()) {
            var videoElement = document.getElementById('videoElement');
            var flvPlayer = flvjs.createPlayer({
                type: 'flv',
                // ดึงภาพสตรีมผ่าน HTTP-FLV พอร์ต 8085 ที่เราตั้งหลบพอร์ตชนไว้ใน Docker
                url: 'http://{{ server_ip }}:8085/live/drone.flv'
            });
            flvPlayer.attachMediaElement(videoElement);
            flvPlayer.load();
            flvPlayer.play();
        }

        // ==========================================
        // 3. ฟังก์ชันปุ่มกดเรียกใช้ Background API
        // ==========================================
        function launchService(type) {
            fetch(`/api/start-service/?service=${type}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert("🚀 " + data.message);
                    } else {
                        alert("❌ เกิดข้อผิดพลาด: " + data.message);
                    }
                })
                .catch(err => alert("❌ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้"));
        }

        function triggerSmartTrack() {
            alert("ส่งสัญญาณคำสั่ง 'Follow by Box Selection' ไปยัง DJI Cloud API เรียบร้อย ตัวโดรนจะเริ่มทำงานล็อกเป้าหมายโดยอัตโนมัติ");
        }
    </script>
</body>
</html>
