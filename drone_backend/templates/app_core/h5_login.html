<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJI Cloud API Handshake</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        .container { background-color: #1e1e1e; padding: 32px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); max-width: 480px; width: 92%; border: 1px solid #333; }
        h2 { color: #deff9a; margin-top: 0; }
        p { color: #aaaaaa; line-height: 1.5; }
        .btn { background-color: #deff9a; color: #121212; border: none; padding: 15px 32px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 16px; }
        .status { margin-top: 20px; font-size: 13px; color: #888888; text-align: left; white-space: pre-wrap; line-height: 1.6; max-height: 280px; overflow-y: auto; }
        .hint { margin-top: 16px; font-size: 12px; color: #666; text-align: left; }
        code { color: #deff9a; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛸 DJI Enterprise Connect</h2>
        <p>เชื่อม Matrice 4E เข้ากับ Ubuntu Server<br>Telemetry (MQTT) + Livestream (RTMP)</p>
        <button class="btn" onclick="startHandshake()">เชื่อมต่อเซิร์ฟเวอร์</button>
        <div id="statusMessage" class="status">สแตนด์บาย — กดปุ่มเพื่อเริ่ม handshake</div>
        <div class="hint">
            H5: <code>http://{{ server_ip }}:{{ django_port }}/dji/login/</code><br>
            MQTT: <code>tcp://{{ server_ip }}:1883</code>
        </div>
    </div>

    <script>
        const APP_ID = "{{ app_id }}";
        const APP_KEY = "{{ app_key }}";
        const APP_LICENSE = "{{ app_license|escapejs }}";
        const WORKSPACE_ID = "{{ workspace_id }}";
        const PLATFORM_NAME = "{{ platform_name|escapejs }}";
        const WORKSPACE_NAME = "{{ workspace_name|escapejs }}";
        const WORKSPACE_DESC = "{{ workspace_desc|escapejs }}";
        const API_HOST = "{{ api_host|escapejs }}";

        function appendStatus(msg) {
            const el = document.getElementById('statusMessage');
            el.textContent = el.textContent + "\n" + msg;
            console.log(msg);
        }

        function parseBridge(res) {
            if (res == null) return { code: -1, message: "empty response" };
            if (typeof res === "string") {
                try { return JSON.parse(res); } catch (e) { return { code: -1, message: res }; }
            }
            return res;
        }

        function callBridge(label, fn) {
            const raw = fn();
            if (raw === true) return { code: 0 };
            if (raw === false) throw new Error(label + " ตอบ false");
            
            const result = parseBridge(raw);
            if (result.code !== 0) {
                throw new Error(label + " ล้มเหลว: " + JSON.stringify(result));
            }
            return result;
        }

        window.thingConnectCallback = function(res) {
            appendStatus("📨 MQTT callback: " + String(res));
            const parsed = parseBridge(res);
            if (parsed.code === 0 || res === true) {
                appendStatus("✅ MQTT เชื่อมต่อสำเร็จ");
                setupLivestream();
            } else {
                appendStatus("❌ MQTT ล้มเหลว: " + JSON.stringify(res));
            }
        };

        window.liveStatusCallback = function(res) {
            appendStatus("📺 Live status: " + (typeof res === "string" ? res : JSON.stringify(res)));
        };

        async function fetchJson(url, options = {}) {
            const resp = await fetch(url, options);
            const json = await resp.json();
            if (json.code !== 0) throw new Error(json.message || "API error");
            return json.data;
        }

        async function setupLivestream() {
            try {
                callBridge("Set Workspace", () => window.djiBridge.platformSetWorkspaceId(WORKSPACE_ID));
                appendStatus("✅ ตั้ง Workspace ID แล้ว");

                callBridge("Set Platform Info", () => window.djiBridge.platformSetInformation(PLATFORM_NAME, WORKSPACE_NAME, WORKSPACE_DESC));
                appendStatus("✅ ตั้งข้อมูล Platform แล้ว");

                if (window.djiBridge.platformLoadComponent) {
                    try {
                        callBridge("Load liveshare", () => window.djiBridge.platformLoadComponent("liveshare", JSON.stringify({
                            videoPublishType: "video-on-demand",
                            statusCallback: "liveStatusCallback"
                        })));
                    } catch (e) {
                        callBridge("Load live", () => window.djiBridge.platformLoadComponent("live", "{}"));
                    }
                }
                appendStatus("✅ โหลด Live Module แล้ว");

                const liveCfg = await fetchJson("/dji/api/v1/livestream-config/");
                if (window.djiBridge.liveshareSetConfig) {
                    callBridge("Set Livestream", () => window.djiBridge.liveshareSetConfig(JSON.stringify({
                        type: 1,
                        url_type: 1,
                        url: liveCfg.url
                    })));
                    appendStatus("✅ ตั้งค่า RTMP สำเร็จ");
                }
                appendStatus("🎉 สมบูรณ์! กดออกหน้านี้ได้เลย");
            } catch (err) {
                appendStatus("⚠️ ข้อผิดพลาด: " + err.message);
            }
        }

        async function startHandshake() {
            if (!window.djiBridge) {
                appendStatus("⚠️ ไม่พบ DJI WebView Interface");
                return;
            }

            document.getElementById('statusMessage').textContent = "กำลังเริ่ม Handshake...";

            try {
                callBridge("Verify License", () => window.djiBridge.platformVerifyLicense(APP_ID, APP_KEY, APP_LICENSE));
                appendStatus("✅ License ผ่านแล้ว");

                const loginData = await fetchJson("/manage/api/v1/login/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: "pilot", password: "pilot123", flag: 2 })
                });
                appendStatus("✅ Login Backend สำเร็จ");

                callBridge("Load API Module", () => window.djiBridge.platformLoadComponent("api", JSON.stringify({
                    host: API_HOST,
                    token: loginData.access_token
                })));
                if (window.djiBridge.apiSetToken) {
                    window.djiBridge.apiSetToken(loginData.access_token);
                }
                appendStatus("✅ โหลด API Module แล้ว");

                const mqttHost = loginData.ws_mqtt_addr; // ws://192.168.1.120:8007/mqtt
                appendStatus("📡 กำลังเชื่อม MQTT -> " + mqttHost);
                
                if (window.djiBridge.platformUnloadComponent) {
                    try { window.djiBridge.platformUnloadComponent("thing"); } catch(e){}
                }

                callBridge("Load Thing Module", () => window.djiBridge.platformLoadComponent("thing", JSON.stringify({
                    host: mqttHost,
                    username: loginData.mqtt_username || "",
                    password: loginData.mqtt_password || "",
                    connectCallback: "thingConnectCallback"
                })));

                appendStatus("⏳ รอผลลัพธ์ MQTT...");
            } catch (err) {
                appendStatus("❌ ข้อผิดพลาด: " + err.message);
            }
        }
    </script>
</body>
</html>
