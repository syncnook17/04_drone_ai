<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJI Cloud API Handshake</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            border: 1px solid #333;
        }
        h2 { color: #deff9a; margin-top: 0; font-size: 22px; }
        p { color: #aaa; font-size: 14px; }
        .btn {
            background-color: #deff9a; color: #121212; border: none;
            padding: 16px 32px; font-size: 18px; font-weight: bold;
            border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px;
            transition: opacity 0.2s;
            box-shadow: 0 4px 15px rgba(222,255,154,0.2);
        }
        .btn:hover { opacity: 0.9; }
        .console-log {
            margin-top: 20px; background: #000000; border: 1px solid #444;
            border-radius: 6px; padding: 15px; text-align: left;
            font-family: monospace; font-size: 12px; color: #38bdf8;
            max-height: 180px; overflow-y: auto; width: 100%; box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛸 DJI Unified Handshake Panel</h2>
        <p>ระบบผูกเครือข่ายรับพิกัด Telemetry และสั่งสตาร์ท Live Stream อัตโนมัติ</p>
        <button class="btn" onclick="startOneClickConnect()">🚀 เริ่มการเชื่อมต่อระบบแบบ One-Click</button>
        
        <div id="consoleLog" class="console-log">=== ระบบสแตนด์บายรอการกดเชื่อมต่อ ===</div>
    </div>

    <script>
        function printLog(msg, color="#38bdf8") {
            let consoleBox = document.getElementById('consoleLog');
            consoleBox.innerHTML += `<br><span style="color: ${color}">> ${msg}</span>`;
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        function parseDjiResponse(resStr) {
            try { return JSON.parse(resStr); } catch(e) { return { code: 0, data: resStr }; }
        }

        // ========================================================
        // 🛠️ ตอกหมุดเพิ่มพิเศษ: ประกาศฟังก์ชัน Callback มารองรับระบบ DJI Native App
        // ========================================================
        window.thingConnectCallback = function(resRaw) {
            printLog("🔔 [MQTT Callback] สถานะการเชื่อมต่อเปลี่ยนเป็น: " + resRaw, "#eab308");
        };

        window.liveStatusCallback = function(resRaw) {
            printLog("📺 [Video Callback] สถานะการสตรีมเปลี่ยนเป็น: " + resRaw, "#eab308");
        };

        function startOneClickConnect() {
            if (!window.djiBridge) {
                printLog("⚠️ ไม่พบ DJI Webview Interface (เปิดบนรีโมตโดรนเท่านั้น)", "#ff4a4a");
                return;
            }

            try {
                let appId = "{{ app_id|escapejs }}";
                let appKey = "{{ app_key|escapejs }}";
                let appLicense = "{{ app_license|escapejs }}";
                let serverIp = "{{ server_ip|escapejs }}";

                // 1. ตรวจสิทธิ์แอปกับ DJI Portal
                printLog("1. กำลังส่งคีย์ตรวจสอบสิทธิ์กับเซิร์ฟเวอร์ DJI...");
                let verifyRaw = window.djiBridge.platformVerifyLicense(appId, appKey, appLicense);
                let verifyRes = parseDjiResponse(verifyRaw);

                if (verifyRes.code !== 0) {
                    printLog("❌ ตรวจสอบสิทธิ์ล้มเหลว: " + verifyRes.message, "#ff4a4a");
                    return;
                }
                printLog("✅ ยืนยันสิทธิ์กับ DJI สำเร็จ!", "#4ade80");

                // 2. ผูกพื้นที่ทำงาน Workspace ID
                printLog("2. กำลังกำหนดขอบเขต Workspace ID...");
                window.djiBridge.platformSetWorkspaceId("e3dea0f5-37f2-4d79-ae58-490af3228069");

                // 3. เชื่อมต่อ MQTT Broker (Thing Component)
                // 🛠️ แก้ไขพิกัดเติม tcp:// นำหน้าตามมาตรฐานความปลอดภัยของ DJI
                let mqttHostUrl = "tcp://" + serverIp + ":1883";
                printLog("3. กำลังส่งคำสั่งต่อท่อ MQTT (Thing)... ปลายทาง: " + mqttHostUrl);
                
                let thingParam = {
                    host: mqttHostUrl,
                    username: "admin", 
                    password: "admin1234",
                    connectCallback: "thingConnectCallback"
                };
                window.djiBridge.platformLoadComponent("thing", JSON.stringify(thingParam));

                // 4. สตาร์ทโปรไฟล์วิดีโอสด (Liveshare Component)
                printLog("4. กำลังเปิดคอมโพเนนต์ Liveshare วิดีโอ...");
                let liveshareParam = {
                    videoPublishType: "video-by-manual",
                    statusCallback: "liveStatusCallback"
                };
                window.djiBridge.platformLoadComponent("liveshare", JSON.stringify(liveshareParam));
                window.djiBridge.liveshareSetVideoPublishType("video-by-manual");

                let rtmpTargetUrl = "rtmp://" + serverIp + ":1935/live/drone";
                let rtmpConfig = { url: rtmpTargetUrl };
                printLog("5. กำลังตั้งค่าพารามิเตอร์ RTMP: " + rtmpTargetUrl);
                window.djiBridge.liveshareSetConfig(2, JSON.stringify(rtmpConfig));

                printLog("6. สั่งการรีโมตสตาร์ทการถ่ายทอดสดอัตโนมัติ...");
                window.djiBridge.liveshareStartLive();
                
                printLog("🎉 ส่งโครงสร้างชุดคำสั่งเข้าสู่แรมรีโมตเรียบร้อย!", "#4ade80");

            } catch (err) {
                printLog("❌ เกิดข้อผิดพลาดในสคริปต์: " + err.message, "#ff4a4a");
            }
        }
    </script>
</body>
</html>
