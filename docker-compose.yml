version: '3.8'

services:
  # 1. MQTT Broker (EMQX) - สำหรับรับพิกัด Telemetry จาก DJI Pilot 2
  mqtt_broker:
    image: emqx/emqx:5.3.0
    container_name: dji_mqtt_emqx
    restart: unless-stopped
    ports:
      - "1883:1883"       # server ภายใน (telemetry_listener)
      - "8006:1883"       # MQTT สำหรับ RC/Pilot (Django ใช้ 8007 แทน!)
      - "8083:8083"
      - "18083:18083"
    volumes:
      - ./emqx/auth-built-in-db.csv:/opt/emqx/data/bootstrap_users.csv:ro
    environment:
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=admin1234
      # ตั้ง built-in database authentication (persist ข้าม restart)
      - EMQX_AUTHENTICATION__1__MECHANISM=password_based
      - EMQX_AUTHENTICATION__1__BACKEND=built_in_database
      - EMQX_AUTHENTICATION__1__PASSWORD_HASH_ALGORITHM__NAME=plain
      - EMQX_AUTHENTICATION__1__PASSWORD_HASH_ALGORITHM__SALT_POSITION=disable
      - EMQX_AUTHENTICATION__1__USER_ID_TYPE=username
      # allow anonymous fallback ปิดไว้ (pilot ต้อง login ด้วย user/pass)
      - EMQX_MQTT__ALLOW_ANONYMOUS=false
    
  # 2. Media Server (SRS) - สำหรับรับสตรีมวิดีโอ RTMP จากรีโมต
  media_server:
    image: ossrs/srs:5
    container_name: dji_rtmp_srs
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "1985:1985"
      - "8085:8080"

  # 3. Gateway — รวม Django (8008) + MQTT WebSocket (/mqtt) ไว้ที่ :8007
  # RC เปิด HTTP :8007 ได้ → ใช้พอร์ตเดียวกันสำหรับ MQTT WS
  gateway:
    image: nginx:alpine
    container_name: dji_gateway
    restart: unless-stopped
    ports:
      - "8007:8007"
    volumes:
      - ./nginx/drone-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mqtt_broker
