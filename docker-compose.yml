version: '3.8'

services:
  # 1. MQTT Broker (EMQX) - สำหรับรับพิกัด Telemetry
  mqtt_broker:
    image: emqx/emqx:5.3.0
    container_name: dji_mqtt_emqx
    ports:
      - "1883:1883"   # MQTT Protocol Port
      - "18083:18083" # Dashboard UI (เปิดผ่านเว็บเพื่อดูสถานะได้)
    environment:
      - "EMQX_DASHBOARD__ADMIN_PASSWORD=admin1234" # รหัสผ่านเข้าหน้าเว็บ

  # 2. Media Server (SRS) - สำหรับรับสตรีมวิดีโอ RTMP จากรีโมต
  media_server:
    image: ossrs/srs:5
    container_name: dji_rtmp_srs
    ports:
      - "1935:1935"   # RTMP Port (ให้โดรนยิงภาพเข้าพอร์ตนี้)
      - "1985:1985"   # HTTP API Port
      - "8085:8080"   # HTTP Stream Port (สำหรับให้หน้าเว็บดึงไปเปิดดู)